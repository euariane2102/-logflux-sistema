<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0BBFA3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0BBFA3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Decorative wave background -->
  <path d="M 0 150 Q 100 100 200 150 T 400 150" stroke="url(#waveGrad)" stroke-width="8" fill="none" opacity="0.3"/>
  <path d="M 900 150 Q 1000 100 1100 150 T 1200 150" stroke="url(#waveGrad)" stroke-width="8" fill="none" opacity="0.3"/>

  <!-- Truck illustration group -->
  <g transform="translate(180, 80)">
    <!-- Truck cabin -->
    <rect x="20" y="60" width="80" height="70" rx="12" fill="none" stroke="#1B3A6B" stroke-width="3"/>
    <rect x="30" y="70" width="50" height="30" rx="4" fill="none" stroke="#1B3A6B" stroke-width="2"/>

    <!-- Truck windshield detail -->
    <line x1="50" y1="70" x2="50" y2="100" stroke="#1B3A6B" stroke-width="1.5" opacity="0.5"/>

    <!-- Truck grill -->
    <rect x="20" y="125" width="25" height="8" fill="none" stroke="#1B3A6B" stroke-width="2"/>
    <line x1="27" y1="125" x2="27" y2="133" stroke="#1B3A6B" stroke-width="1"/>
    <line x1="33" y1="125" x2="33" y2="133" stroke="#1B3A6B" stroke-width="1"/>
    <line x1="39" y1="125" x2="39" y2="133" stroke="#1B3A6B" stroke-width="1"/>

    <!-- Silo tank - large cylinder -->
    <ellipse cx="180" cy="60" rx="90" ry="20" fill="none" stroke="#1B3A6B" stroke-width="3"/>
    <rect x="90" y="60" width="180" height="80" fill="none" stroke="#1B3A6B" stroke-width="3"/>
    <ellipse cx="180" cy="140" rx="90" ry="20" fill="none" stroke="#1B3A6B" stroke-width="3"/>

    <!-- Silo tank cap/top detail -->
    <path d="M 100 60 Q 100 50 180 48 Q 260 50 260 60" fill="none" stroke="#1B3A6B" stroke-width="2"/>

    <!-- Silo dome -->
    <ellipse cx="180" cy="50" rx="70" ry="15" fill="none" stroke="#1B3A6B" stroke-width="2"/>

    <!-- Silo segments/panels -->
    <line x1="130" y1="60" x2="130" y2="140" stroke="#1B3A6B" stroke-width="1.5" opacity="0.4"/>
    <line x1="180" y1="60" x2="180" y2="140" stroke="#1B3A6B" stroke-width="1.5" opacity="0.4"/>
    <line x1="230" y1="60" x2="230" y2="140" stroke="#1B3A6B" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom discharge cone -->
    <polygon points="120,140 180,180 240,140" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>

    <!-- Discharge door -->
    <line x1="160" y1="155" x2="200" y2="155" stroke="#1B3A6B" stroke-width="2"/>

    <!-- Wheels truck -->
    <circle cx="50" cy="165" r="18" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <circle cx="50" cy="165" r="10" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

    <!-- Axle -->
    <line x1="20" y1="165" x2="330" y2="165" stroke="#1B3A6B" stroke-width="2" opacity="0.3"/>

    <!-- Silo wheels - double axle -->
    <circle cx="130" cy="165" r="16" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <circle cx="130" cy="165" r="8" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>
    <circle cx="160" cy="165" r="16" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <circle cx="160" cy="165" r="8" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

    <circle cx="240" cy="165" r="16" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <circle cx="240" cy="165" r="8" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>
    <circle cx="270" cy="165" r="16" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <circle cx="270" cy="165" r="8" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>
  </g>

  <!-- Main text: SILOFLUX -->
  <text x="420" y="180" font-family="'Sora', 'Segoe UI', Arial, sans-serif" font-size="120" font-weight="800" fill="#1B3A6B" letter-spacing="-2">SILO</text>
  <text x="900" y="180" font-family="'Sora', 'Segoe UI', Arial, sans-serif" font-size="120" font-weight="800" fill="#0BBFA3" letter-spacing="-2">FLUX</text>

  <!-- Tagline: LOGÍSTICA QUE FLUI -->
  <text x="420" y="240" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#6B7280" letter-spacing="3" text-transform="uppercase">LOGÍSTICA QUE FLUI</text>

  <!-- Feature icons row -->
  <g transform="translate(420, 290)">
    <!-- Icon 1: Chart/Growth -->
    <g>
      <circle cx="30" cy="35" r="28" fill="none" stroke="#1B3A6B" stroke-width="2"/>
      <path d="M 20 45 L 30 35 L 40 42" fill="none" stroke="#1B3A6B" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="48" r="2" fill="#1B3A6B"/>
      <circle cx="40" cy="42" r="2" fill="#1B3A6B"/>
      <text x="30" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">GESTÃO</text>
      <text x="30" y="105" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">INTELIGENTE</text>
    </g>

    <!-- Icon 2: Location/GPS -->
    <g transform="translate(200, 0)">
      <circle cx="30" cy="35" r="28" fill="none" stroke="#0BBFA3" stroke-width="2"/>
      <path d="M 30 20 C 22 20 16 26 16 34 C 16 42 30 52 30 52 C 30 52 44 42 44 34 C 44 26 38 20 30 20" fill="none" stroke="#0BBFA3" stroke-width="2"/>
      <circle cx="30" cy="35" r="6" fill="none" stroke="#0BBFA3" stroke-width="1.5"/>
      <text x="30" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">CONTROLE E</text>
      <text x="30" y="105" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">RASTREABILIDADE</text>
    </g>

    <!-- Icon 3: Checklist -->
    <g transform="translate(400, 0)">
      <circle cx="30" cy="35" r="28" fill="none" stroke="#1B3A6B" stroke-width="2"/>
      <rect x="16" y="20" width="28" height="30" rx="2" fill="none" stroke="#1B3A6B" stroke-width="2"/>
      <polyline points="20,32 25,37 35,27" fill="none" stroke="#1B3A6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">CONTROLE</text>
      <text x="30" y="105" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#1B3A6B" text-anchor="middle">DE LAUDOS</text>
    </g>
  </g>
</svg>