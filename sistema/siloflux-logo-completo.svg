<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .silo-text-1 { font-family: 'Sora', 'Arial', sans-serif; font-size: 90px; font-weight: 800; letter-spacing: -2px; }
      .silo-text-2 { font-family: 'Sora', 'Arial', sans-serif; font-size: 90px; font-weight: 800; letter-spacing: -2px; }
      .tagline { font-family: 'Inter', 'Arial', sans-serif; font-size: 18px; font-weight: 400; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Truck/Silo illustration (simplified) -->
  <g>
    <!-- Silo tank body -->
    <ellipse cx="60" cy="35" rx="35" ry="12" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <rect x="25" y="35" width="70" height="50" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
    <ellipse cx="60" cy="85" rx="35" ry="12" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>

    <!-- Silo discharge cone -->
    <polygon points="40,85 60,110 80,85" fill="none" stroke="#1B3A6B" stroke-width="2"/>

    <!-- Truck cabin -->
    <rect x="100" y="50" width="35" height="40" rx="5" fill="none" stroke="#1B3A6B" stroke-width="2"/>
    <rect x="105" y="55" width="25" height="18" rx="2" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

    <!-- Wheels -->
    <circle cx="45" cy="110" r="8" fill="none" stroke="#1B3A6B" stroke-width="2"/>
    <circle cx="75" cy="110" r="8" fill="none" stroke="#1B3A6B" stroke-width="2"/>
    <circle cx="115" cy="110" r="8" fill="none" stroke="#1B3A6B" stroke-width="2"/>
  </g>

  <!-- SILOFLUX text -->
  <text x="155" y="105" class="silo-text-1" fill="#1B3A6B">SILO</text>
  <text x="470" y="105" class="silo-text-2" fill="#0BBFA3">FLUX</text>

  <!-- Tagline -->
  <text x="155" y="140" class="tagline" fill="#6B7280">LOGÍSTICA QUE FLUI</text>
</svg>